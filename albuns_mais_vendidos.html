<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Álbuns Mais Vendidos da História</title>
  <link rel="stylesheet" href="style.css"/>
  

</head>
<body>

  <div class="table-container">
        <table id="albumsTable">
            <caption>Lista dos 55 álbuns de música mais vendidos da história (Clique nos cabeçalhos para ordenar)</caption>
            <thead>
                <tr>
                    <th onclick="sortTable('pos', 0)" class="num">Posição <span></span></th>
                    <th onclick="sortTable('artist', 1)">Artista <span></span></th>
                    <th onclick="sortTable('album', 2)">Álbum <span></span></th>
                    <th onclick="sortTable('year', 3)" class="num">Ano <span></span></th>
                    <th onclick="sortTable('sales', 4)" class="num">Vendas (Milhões) <span></span></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>

            { pos: 12, artist: "Nirvana", album: "Nevermind", year: 1991, sales: 27.8 },

            { pos: 28, artist: "The Who", album: "Tommy", year: 1969, sales: 20.0 },
            { pos: 29, artist: "Green Day", album: "Dookie", year: 1994, sales: 19.8 },

            { pos: 51, artist: "Red Hot Chili Peppers", album: "Blood Sugar Sex Magik", year: 1991, sales: 15.5 },
            { pos: 52, artist: "Radiohead", album: "OK Computer", year: 1997, sales: 15.2 },
            { pos: 53, artist: "Aerosmith", album: "Toys in the Attic", year: 1975, sales: 15.0 },
            { pos: 54, artist: "Foo Fighters", album: "The Colour and the Shape", year: 1997, sales: 14.8 },
            { pos: 55, artist: "Coldplay", album: "A Rush of Blood to the Head", year: 2002, sales: 14.5 }
        ];
        let currentSort = { key: 'pos', asc: true };

        function sortTable(key, colIndex) {
            if (currentSort.key === key) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.key = key;
                currentSort.asc = true;
            }

            // Atualizar setas do cabeçalho
            const ths = document.querySelectorAll('th span');
            ths.forEach(span => span.innerText = '');
            ths[colIndex].innerText = currentSort.asc ? ' ▲' : ' ▼';

            // Ordenar
            tableData.sort((a, b) => {
                let valA = a[key];
                let valB = b[key];
                if (typeof valA === 'string') { valA = valA.toLowerCase(); valB = valB.toLowerCase(); }
                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });

            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            const keys = ['pos', 'artist', 'album', 'year', 'sales'];
            
            // Lógica do DESAFIO: Calcular rowspan para dados que se repetem consecutivamente
            let rowspans = Array.from({length: tableData.length}, () => ({}));

            for (let j = 0; j < keys.length; j++) {
                let key = keys[j];
                for (let i = 0; i < tableData.length; i++) {
                    if (rowspans[i][key] === undefined) {
                        let span = 1;
                        for (let k = i + 1; k < tableData.length; k++) {
                            if (tableData[k][key] === tableData[i][key]) {
                                span++;
                            } else {
                                break;
                            }
                        }
                        rowspans[i][key] = span;
                        for (let k = i + 1; k < i + span; k++) {
                            rowspans[k][key] = 0; // Marca para não renderizar o TD
                        }
                    }
                }
            }

            // Montar HTML da tabela com os rowspans
            for (let i = 0; i < tableData.length; i++) {
                let tr = document.createElement('tr');

                keys.forEach(key => {
                    if (rowspans[i][key] > 0) {
                        let td = document.createElement('td');
                        if (rowspans[i][key] > 1) {
                            td.rowSpan = rowspans[i][key];
                        }
                        
                        if (key === 'pos' || key === 'year' || key === 'sales') {
                            td.className = 'num';
                        }

                        if (key === 'sales') {
                            td.innerText = tableData[i][key].toFixed(1).replace('.', ',');
                        } else {
                            td.innerText = tableData[i][key];
                        }
                        tr.appendChild(td);
                    }
                });
                tbody.appendChild(tr);
            }
        }

        // Renderizar ao carregar a página
        window.onload = () => {
            document.querySelectorAll('th span')[0].innerText = ' ▲';
            renderTable();
        };
    </script>

</body>
</html>
